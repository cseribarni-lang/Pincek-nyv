<script>
const SB_URL='https://tbigqmtirjaukhxwmqhw.supabase.co';
const SB_KEY='sb_publishable_6UD_aMtMYZxsHd5wXUmthw_UodjS_yH';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

function badge(id,ms){const e=document.getElementById(id);if(!e)return;e.style.opacity='1';setTimeout(()=>e.style.opacity='0',ms||1800);}

async function sbSelect(table,query){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${query||'select=*'}`,{headers:SB_H,signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error('select failed');
    badge('sync-badge',1200);
    return await r.json();
  }catch(e){ badge('offline-badge',2000); return null; }
}
async function sbInsert(table,obj){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...SB_H,'Prefer':'return=representation'},body:JSON.stringify(obj),signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error('insert failed');
    badge('sync-badge',1500);
    return await r.json();
  }catch(e){ badge('offline-badge',2500); return null; }
}
async function sbUpdate(table,id,obj){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...SB_H,'Prefer':'return=representation'},body:JSON.stringify(obj),signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error('update failed');
    badge('sync-badge',1200);
    return await r.json();
  }catch(e){ badge('offline-badge',2500); return null; }
}
async function sbDelete(table,id){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:SB_H,signal:AbortSignal.timeout(8000)});
    badge('sync-badge',1200);
    return r.ok;
  }catch(e){ badge('offline-badge',2500); return false; }
}

// Realtime websocket — egyszerű broadcast figyelő, amely jelzi ha bármi változott
let rtCallback=null;
(function rt(){
  const wu=SB_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SB_KEY+'&vsn=1.0.0';
  let ws,hb,ref=1;
  const tables=['tetelek','tetel_stadiumok','kezelesek','analitikak','kezeloanyagok'];
  function conn(){
    try{
      ws=new WebSocket(wu);
      ws.onopen=()=>{
        tables.forEach(t=>{
          ws.send(JSON.stringify({topic:'realtime:public:'+t,event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:t}]}},ref:String(ref++)}));
        });
        hb=setInterval(()=>{if(ws.readyState===1)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));},25000);
      };
      ws.onmessage=e=>{
        try{
          const m=JSON.parse(e.data);
          if(m.event==='postgres_changes' || m.payload?.data){
            if(rtCallback) rtCallback();
            badge('sync-badge',1500);
          }
        }catch(err){}
      };
      ws.onclose=()=>{clearInterval(hb);setTimeout(conn,6000);};
      ws.onerror=()=>ws.close();
    }catch(e){setTimeout(conn,10000);}
  }
  conn();
})();
</script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

const BORFAJTA_SZIN = {
  'Fehérbor': '#C9A961',
  'Vörösbor': '#7A1F2B',
  'Rosé': '#C77B6F',
  'Pezsgő': '#8FA68E'
};

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('hu-HU',{year:'numeric',month:'2-digit',day:'2-digit'});
}

// ---------- App gyökér ----------
function App(){
  const [tetelek,setTetelek] = useState([]);
  const [sablonok,setSablonok] = useState({}); // borfajta -> [stadium nevek sorrendben]
  const [kezeloanyagok,setKezeloanyagok] = useState([]);
  const [edenyek,setEdenyek] = useState([]);
  const [edenyTartalom,setEdenyTartalom] = useState([]);
  const [kivalasztott,setKivalasztott] = useState(null);
  const [loading,setLoading] = useState(true);
  const [ujTetelNyitva,setUjTetelNyitva] = useState(false);
  const [szuro,setSzuro] = useState('mind');
  const [nezet,setNezet] = useState('tetelek'); // 'tetelek' | 'edenyek'
  const [exportNyitva,setExportNyitva] = useState(false);

  const loadAll = useCallback(async ()=>{
    const [tArr, sablonArr, stadiumArr, anyagArr, edenyArr, tartalomArr] = await Promise.all([
      sbSelect('tetelek','select=*&order=letrehozva.desc'),
      sbSelect('bor_sablonok','select=*'),
      sbSelect('bor_sablon_stadiumok','select=*&order=sorrend.asc'),
      sbSelect('kezeloanyagok','select=*&order=kategoria.asc,nev.asc'),
      sbSelect('edenyek','select=*&order=nev.asc'),
      sbSelect('edeny_tartalom','select=*,tetelek(azonosito,fajta,borfajta)')
    ]);
    if(tArr) setTetelek(tArr);
    if(anyagArr) setKezeloanyagok(anyagArr);
    if(edenyArr) setEdenyek(edenyArr);
    if(tartalomArr) setEdenyTartalom(tartalomArr);
    if(sablonArr && stadiumArr){
      const map = {};
      sablonArr.forEach(s=>{
        map[s.borfajta] = stadiumArr.filter(st=>st.sablon_id===s.id).map(st=>st.nev);
      });
      setSablonok(map);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{
    loadAll();
    rtCallback = ()=>loadAll();
    return ()=>{ rtCallback=null; };
  },[loadAll]);

  const tetelekSzurve = szuro==='mind' ? tetelek : tetelek.filter(t=>t.allapot===szuro);

  return (
    <div style={{display:'flex',minHeight:'100vh',flexDirection:'column'}}>
      <Header onUjTetel={()=>setUjTetelNyitva(true)} onExport={()=>setExportNyitva(true)} nezet={nezet} setNezet={setNezet} />
      {nezet==='tetelek' && (
        <div style={{display:'flex',flex:1,minHeight:0}}>
          <div className={kivalasztott ? 'sidebar-wrap sidebar-hide-mobile' : 'sidebar-wrap'}>
            <Sidebar
              tetelek={tetelekSzurve}
              kivalasztott={kivalasztott}
              onValaszt={setKivalasztott}
              szuro={szuro}
              setSzuro={setSzuro}
              loading={loading}
            />
          </div>
          <div className={kivalasztott ? 'mainpanel-wrap' : 'mainpanel-wrap mainpanel-hide-mobile'} style={{flex:1,minWidth:0}}>
            <MainPanel
              tetel={tetelek.find(t=>t.id===kivalasztott)}
              sablonok={sablonok}
              kezeloanyagok={kezeloanyagok}
              edenyek={edenyek}
              edenyTartalom={edenyTartalom}
              onReload={loadAll}
              onVissza={()=>setKivalasztott(null)}
            />
          </div>
        </div>
      )}
      {nezet==='edenyek' && (
        <EdenyekNezet
          edenyek={edenyek}
          edenyTartalom={edenyTartalom}
          tetelek={tetelek}
          onReload={loadAll}
        />
      )}
      {nezet==='kezeloanyagok' && (
        <KezeloanyagokNezet
          kezeloanyagok={kezeloanyagok}
          onReload={loadAll}
        />
      )}
      {ujTetelNyitva && (
        <UjTetelModal
          sablonok={sablonok}
          onClose={()=>setUjTetelNyitva(false)}
          onCreated={(id)=>{ loadAll(); setKivalasztott(id); setUjTetelNyitva(false); }}
        />
      )}
      {exportNyitva && (
        <ExportModal
          tetelek={tetelek}
          onClose={()=>setExportNyitva(false)}
        />
      )}
      <style>{`
        @media (max-width: 720px){
          .sidebar-hide-mobile{ display:none !important; }
          .mainpanel-hide-mobile{ display:none !important; }
          .sidebar-aside{ width:100% !important; min-width:0 !important; }
          .vissza-gomb-mobil{ display:inline-flex !important; }
        }
      `}</style>
    </div>
  );
}

function Header({onUjTetel,onExport,nezet,setNezet}){
  const [menuNyitva,setMenuNyitva] = useState(false);

  const navGombok = (
    <>
      <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.08)',borderRadius:8,padding:3}}>
        <button onClick={()=>{setNezet('tetelek');setMenuNyitva(false);}} style={{
          background: nezet==='tetelek' ? 'var(--must)' : 'transparent',
          color: nezet==='tetelek' ? 'var(--ink)' : 'var(--cream)',
          border:'none', borderRadius:6, padding:'7px 14px', fontWeight:600, fontSize:13, cursor:'pointer'
        }}>Tételek</button>
        <button onClick={()=>{setNezet('edenyek');setMenuNyitva(false);}} style={{
          background: nezet==='edenyek' ? 'var(--must)' : 'transparent',
          color: nezet==='edenyek' ? 'var(--ink)' : 'var(--cream)',
          border:'none', borderRadius:6, padding:'7px 14px', fontWeight:600, fontSize:13, cursor:'pointer'
        }}>Edények</button>
        <button onClick={()=>{setNezet('kezeloanyagok');setMenuNyitva(false);}} style={{
          background: nezet==='kezeloanyagok' ? 'var(--must)' : 'transparent',
          color: nezet==='kezeloanyagok' ? 'var(--ink)' : 'var(--cream)',
          border:'none', borderRadius:6, padding:'7px 14px', fontWeight:600, fontSize:13, cursor:'pointer'
        }}>Kezelőanyagok</button>
      </div>
      <button onClick={()=>{onExport();setMenuNyitva(false);}} style={{
        background:'transparent', color:'var(--cream)', border:'1px solid rgba(255,255,255,0.25)', borderRadius:6,
        padding:'9px 14px', fontWeight:600, fontSize:13, cursor:'pointer'
      }}>⬇ Export Excelbe</button>
      {nezet==='tetelek' && (
        <button onClick={()=>{onUjTetel();setMenuNyitva(false);}} style={{
          background:'var(--must)', color:'var(--ink)', border:'none', borderRadius:6,
          padding:'9px 16px', fontWeight:700, fontSize:14, cursor:'pointer'
        }}>+ Új tétel</button>
      )}
    </>
  );

  return (
    <header style={{
      background:'var(--ink)', color:'var(--cream)', padding:'14px 18px',
      borderBottom:'3px solid var(--must)', position:'relative', zIndex:200
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,minWidth:0,overflow:'hidden'}}>
          <span className="display" style={{fontSize:22,fontWeight:600,letterSpacing:'.01em',whiteSpace:'nowrap'}}>Pincekönyv</span>
          <span className="header-subtitle" style={{fontSize:12,color:'var(--must)',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'.05em',whiteSpace:'nowrap'}}>SZŐLŐTŐL PALACKIG</span>
        </div>

        {/* Desktop nav - elrejtve mobilon */}
        <div className="header-desktop-nav" style={{display:'flex',alignItems:'center',gap:14}}>
          {navGombok}
        </div>

        {/* Hamburger gomb - csak mobilon látszik */}
        <button className="header-hamburger" onClick={()=>setMenuNyitva(!menuNyitva)} style={{
          display:'none', background:'rgba(255,255,255,0.1)', border:'none', borderRadius:6,
          width:38, height:38, color:'var(--cream)', fontSize:20, cursor:'pointer', alignItems:'center', justifyContent:'center'
        }}>{menuNyitva ? '✕' : '☰'}</button>
      </div>

      {/* Mobil lenyíló menü */}
      {menuNyitva && (
        <div className="header-mobile-menu" style={{
          display:'none', flexDirection:'column', gap:10, marginTop:14, paddingTop:14,
          borderTop:'1px solid rgba(255,255,255,0.15)'
        }}>
          {navGombok}
        </div>
      )}

      <style>{`
        @media (max-width: 720px){
          .header-desktop-nav{ display:none !important; }
          .header-hamburger{ display:flex !important; }
          .header-mobile-menu{ display:flex !important; }
          .header-mobile-menu > div, .header-mobile-menu > button { width:100%; }
          .header-mobile-menu > div { flex-direction:column; }
          .header-subtitle{ display:none; }
        }
      `}</style>
    </header>
  );
}

function Sidebar({tetelek,kivalasztott,onValaszt,szuro,setSzuro,loading}){
  return (
    <aside className="sidebar-aside" style={{
      width:300, minWidth:300, borderRight:'1px solid var(--line)', background:'var(--paper)',
      overflowY:'auto', display:'flex', flexDirection:'column'
    }}>
      <div style={{padding:'14px 16px 8px', display:'flex', gap:6}}>
        {['mind','aktív','lezárt','palackozott'].map(s=>(
          <button key={s} onClick={()=>setSzuro(s)} style={{
            fontSize:11, padding:'5px 9px', borderRadius:14, border:'1px solid var(--line)',
            background: szuro===s ? 'var(--ink)' : 'transparent',
            color: szuro===s ? 'var(--cream)' : 'var(--ink-soft)',
            cursor:'pointer', fontWeight:600, textTransform:'capitalize'
          }}>{s}</button>
        ))}
      </div>
      <div style={{flex:1, overflowY:'auto', padding:'4px 10px 16px'}}>
        {loading && <div style={{padding:20,color:'var(--ink-soft)',fontSize:13}}>Betöltés…</div>}
        {!loading && tetelek.length===0 && (
          <div style={{padding:'30px 14px',color:'var(--ink-soft)',fontSize:13,textAlign:'center'}}>
            Még nincs felvitt tétel.<br/>Kattints a "+ Új tétel" gombra.
          </div>
        )}
        {tetelek.map(t=>(
          <TetelKartya key={t.id} tetel={t} kivalasztva={t.id===kivalasztott} onClick={()=>onValaszt(t.id)} />
        ))}
      </div>
    </aside>
  );
}

function TetelKartya({tetel,kivalasztva,onClick}){
  const szin = BORFAJTA_SZIN[tetel.borfajta] || '#999';
  return (
    <div onClick={onClick} style={{
      padding:'12px 14px', marginBottom:6, borderRadius:8, cursor:'pointer',
      background: kivalasztva ? '#EFEAD9' : 'transparent',
      border: kivalasztva ? '1px solid var(--must)' : '1px solid transparent',
      transition:'background .15s'
    }}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:szin,flexShrink:0}}></div>
        <div className="display" style={{fontWeight:600,fontSize:15,color:'var(--ink)'}}>{tetel.azonosito}</div>
      </div>
      <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:3,marginLeft:16}}>
        {tetel.fajta} · {tetel.evjarat}
      </div>
      <div style={{fontSize:11,color:'var(--ink-soft)',marginTop:2,marginLeft:16,fontFamily:"'JetBrains Mono',monospace"}}>
        {tetel.allapot.toUpperCase()}
      </div>
    </div>
  );
}

// ---------- Fő panel ----------
function MainPanel({tetel,sablonok,kezeloanyagok,edenyek,edenyTartalom,onReload,onVissza}){
  if(!tetel){
    return (
      <main style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-soft)'}}>
        <div style={{textAlign:'center',maxWidth:340}}>
          <div className="display" style={{fontSize:22,marginBottom:8,color:'var(--ink)'}}>Válassz egy tételt</div>
          <div style={{fontSize:14}}>A bal oldali listából válassz egy tételt, vagy hozz létre egy újat a folyamat elindításához.</div>
        </div>
      </main>
    );
  }
  return <TetelReszletek tetel={tetel} sablonok={sablonok} kezeloanyagok={kezeloanyagok} edenyek={edenyek} edenyTartalom={edenyTartalom} onReload={onReload} onVissza={onVissza} />;
}

function TetelReszletek({tetel,sablonok,kezeloanyagok,edenyek,edenyTartalom,onReload,onVissza}){
  const [stadiumok,setStadiumok] = useState([]);
  const [kezelesek,setKezelesek] = useState([]);
  const [analitikak,setAnalitikak] = useState([]);
  const [tab,setTab] = useState('idovonal'); // idovonal | kezelesek | analitika
  const [ujKezelesNyitva,setUjKezelesNyitva] = useState(false);
  const [ujAnalitikaNyitva,setUjAnalitikaNyitva] = useState(false);
  const [szerkesztesNyitva,setSzerkesztesNyitva] = useState(false);
  const [torlesNyitva,setTorlesNyitva] = useState(false);
  const [torles,setTorles] = useState(false);

  const tetelTorles = async () => {
    setTorles(true);
    await sbDelete('tetelek', tetel.id);
    setTorles(false);
    setTorlesNyitva(false);
    onVissza();
    onReload();
  };

  const load = useCallback(async ()=>{
    const [st, kz, an] = await Promise.all([
      sbSelect('tetel_stadiumok', `select=*&tetel_id=eq.${tetel.id}&order=sorrend.asc`),
      sbSelect('kezelesek', `select=*,kezeloanyagok(nev)&tetel_id=eq.${tetel.id}&order=datum.desc,letrehozva.desc`),
      sbSelect('analitikak', `select=*&tetel_id=eq.${tetel.id}&order=datum.desc`)
    ]);
    if(st) setStadiumok(st);
    if(kz) setKezelesek(kz);
    if(an) setAnalitikak(an);
  },[tetel.id]);

  useEffect(()=>{ load(); },[load]);

  const szin = BORFAJTA_SZIN[tetel.borfajta] || '#999';

  const lepesVegrehajt = async (irany) => {
    if(irany==='kovetkezo'){
      const aktualisIdx = stadiumok.findIndex(s => !s.befejezve);
      if(aktualisIdx>=0){
        const most = new Date().toISOString();
        await sbUpdate('tetel_stadiumok', stadiumok[aktualisIdx].id, {befejezve: most});
        const kovetkezoIdx = aktualisIdx+1;
        if(stadiumok[kovetkezoIdx]){
          await sbUpdate('tetel_stadiumok', stadiumok[kovetkezoIdx].id, {elkezdve: most});
          await sbUpdate('tetelek', tetel.id, {jelenlegi_stadium_sorrend: stadiumok[kovetkezoIdx].sorrend});
        } else {
          await sbUpdate('tetelek', tetel.id, {allapot:'palackozott'});
        }
        load(); onReload();
      }
    } else if(irany==='vissza'){
      // Ha a tétel már palackozott, az utolsó stádiumot nyitjuk vissza
      if(tetel.allapot==='palackozott'){
        const utolso = stadiumok[stadiumok.length-1];
        if(utolso){
          await sbUpdate('tetel_stadiumok', utolso.id, {befejezve: null});
          await sbUpdate('tetelek', tetel.id, {allapot:'aktív', jelenlegi_stadium_sorrend: utolso.sorrend});
        }
        load(); onReload();
        return;
      }
      const aktualisIdx = stadiumok.findIndex(s => !s.befejezve);
      const elozoIdx = aktualisIdx >= 1 ? aktualisIdx-1 : (aktualisIdx===-1 ? stadiumok.length-1 : -1);
      if(elozoIdx>=0 && stadiumok[elozoIdx]){
        // Az előző stádiumot nyitjuk vissza (befejezve=null), a jelenlegit pedig elkezdve=null-ra állítjuk
        await sbUpdate('tetel_stadiumok', stadiumok[elozoIdx].id, {befejezve: null});
        if(aktualisIdx>=0 && stadiumok[aktualisIdx]){
          await sbUpdate('tetel_stadiumok', stadiumok[aktualisIdx].id, {elkezdve: null});
        }
        await sbUpdate('tetelek', tetel.id, {jelenlegi_stadium_sorrend: stadiumok[elozoIdx].sorrend});
        load(); onReload();
      }
    }
  };

  const aktualisStadiumIdx = stadiumok.findIndex(s => !s.befejezve);
  const lehetVisszalepni = tetel.allapot==='palackozott' || aktualisStadiumIdx > 0;

  return (
    <main style={{flex:1, overflowY:'auto', padding:'24px 32px', background:'var(--cream)'}}>
      <button className="vissza-gomb-mobil" onClick={onVissza} style={{
        display:'none', background:'var(--paper)', border:'1px solid var(--line)', borderRadius:6,
        padding:'8px 14px', fontSize:13, fontWeight:600, cursor:'pointer', color:'var(--ink)', marginBottom:14
      }}>← Vissza a tételekhez</button>
      {/* Pincekönyv fejléc kártya */}
      <div style={{
        background:'var(--paper)', border:'1px solid var(--line)', borderRadius:12,
        padding:'22px 26px', marginBottom:24, position:'relative', overflow:'hidden'
      }}>
        <div style={{position:'absolute',top:0,left:0,bottom:0,width:6,background:szin}}></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
          <div>
            <div className="display" style={{fontSize:28,fontWeight:600,color:'var(--ink)'}}>{tetel.azonosito}</div>
            <div style={{fontSize:14,color:'var(--ink-soft)',marginTop:4}}>
              {tetel.fajta} · {tetel.borfajta} · {tetel.evjarat}évjárat
              {tetel.dulo ? ` · ${tetel.dulo}` : ''}
            </div>
            <div className="mono" style={{fontSize:13,color:'var(--ink-soft)',marginTop:6}}>
              {tetel.mennyiseg_kg ? `${tetel.mennyiseg_kg} kg` : ''}
              {tetel.mennyiseg_liter ? `  ·  ${tetel.mennyiseg_liter} l` : ''}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={()=>setSzerkesztesNyitva(true)} style={{
              background:'transparent', border:'1px solid var(--line)', borderRadius:6,
              padding:'6px 12px', fontSize:12.5, fontWeight:600, cursor:'pointer', color:'var(--ink-soft)'
            }}>✎ Szerkesztés</button>
            <button onClick={()=>setTorlesNyitva(true)} style={{
              background:'transparent', border:'1px solid var(--line)', borderRadius:6,
              padding:'6px 12px', fontSize:12.5, fontWeight:600, cursor:'pointer', color:'var(--wine)'
            }}>🗑 Törlés</button>
            <div style={{
              background: tetel.allapot==='palackozott' ? 'var(--leaf)' : (tetel.allapot==='lezárt' ? 'var(--oak)' : szin),
              color:'#fff', fontSize:12, fontWeight:700, padding:'6px 14px', borderRadius:20, letterSpacing:'.03em'
            }}>{tetel.allapot.toUpperCase()}</div>
          </div>
        </div>

        {tetel.megjegyzes && (
          <div style={{marginTop:10, fontSize:13, color:'var(--ink-soft)', fontStyle:'italic'}}>{tetel.megjegyzes}</div>
        )}

        {edenyTartalom && edenyTartalom.filter(t=>t.tetel_id===tetel.id).length > 0 && (
          <div style={{marginTop:12, display:'flex', flexWrap:'wrap', gap:8}}>
            {edenyTartalom.filter(t=>t.tetel_id===tetel.id).map(t=>{
              const e = edenyek.find(ed=>ed.id===t.edeny_id);
              return (
                <div key={t.id} className="mono" style={{
                  fontSize:11.5, background:'#EEEAE0', color:'var(--ink)', padding:'4px 10px',
                  borderRadius:14, fontWeight:600
                }}>
                  🛢 {e ? e.nev : '?'}{t.agazat?`/${t.agazat}`:''} — {t.mennyiseg_liter} l
                </div>
              );
            })}
          </div>
        )}

        {/* Stádium progresszsáv - hordócsap stílusú jelölők */}
        <div style={{marginTop:26}}>
          <StadiumSav stadiumok={stadiumok} szin={szin} />
          <div style={{marginTop:16,display:'flex',justifyContent:'flex-end',gap:8}}>
            {lehetVisszalepni && (
              <button onClick={()=>lepesVegrehajt('vissza')} style={{
                background:'transparent', color:'var(--ink-soft)', border:'1px solid var(--line)', borderRadius:6,
                padding:'9px 16px', fontWeight:600, fontSize:13, cursor:'pointer'
              }}>← Előző stádium</button>
            )}
            {tetel.allapot==='aktív' && (
              <button onClick={()=>lepesVegrehajt('kovetkezo')} style={{
                background:'var(--ink)', color:'var(--cream)', border:'none', borderRadius:6,
                padding:'9px 18px', fontWeight:600, fontSize:13, cursor:'pointer'
              }}>Következő stádium →</button>
            )}
          </div>
        </div>
      </div>

      {/* Tabok */}
      <div style={{display:'flex',gap:4,borderBottom:'1px solid var(--line)',marginBottom:18}}>
        {[['idovonal','Idővonal'],['kezelesek','Kezelések'],['analitika','Analitika']].map(([k,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{
            background:'none', border:'none', padding:'10px 16px', cursor:'pointer',
            fontWeight:600, fontSize:14, color: tab===k ? 'var(--ink)' : 'var(--ink-soft)',
            borderBottom: tab===k ? '2px solid var(--must)' : '2px solid transparent'
          }}>{label}</button>
        ))}
        <div style={{flex:1}}></div>
        {tab==='kezelesek' && (
          <button onClick={()=>setUjKezelesNyitva(true)} style={{
            background:'var(--must)', border:'none', borderRadius:6, padding:'8px 14px',
            fontWeight:700, fontSize:13, cursor:'pointer', color:'var(--ink)', marginBottom:6
          }}>+ Kezelés rögzítése</button>
        )}
        {tab==='analitika' && (
          <button onClick={()=>setUjAnalitikaNyitva(true)} style={{
            background:'var(--must)', border:'none', borderRadius:6, padding:'8px 14px',
            fontWeight:700, fontSize:13, cursor:'pointer', color:'var(--ink)', marginBottom:6
          }}>+ Mérés rögzítése</button>
        )}
      </div>

      {tab==='idovonal' && <Idovonal stadiumok={stadiumok} kezelesek={kezelesek} analitikak={analitikak} />}
      {tab==='kezelesek' && <KezelesLista kezelesek={kezelesek} stadiumok={stadiumok} />}
      {tab==='analitika' && <AnalitikaLista analitikak={analitikak} />}

      {ujKezelesNyitva && (
        <UjKezelesModal
          tetel={tetel} stadiumok={stadiumok} kezeloanyagok={kezeloanyagok}
          onClose={()=>setUjKezelesNyitva(false)}
          onCreated={()=>{ load(); setUjKezelesNyitva(false); }}
        />
      )}
      {ujAnalitikaNyitva && (
        <UjAnalitikaModal
          tetel={tetel}
          onClose={()=>setUjAnalitikaNyitva(false)}
          onCreated={()=>{ load(); setUjAnalitikaNyitva(false); }}
        />
      )}
      {szerkesztesNyitva && (
        <UjTetelModal
          sablonok={sablonok} tetel={tetel}
          onClose={()=>setSzerkesztesNyitva(false)}
          onCreated={()=>{ onReload(); setSzerkesztesNyitva(false); }}
        />
      )}
      {torlesNyitva && (
        <ModalShell title="Tétel törlése" onClose={()=>setTorlesNyitva(false)}>
          <div style={{fontSize:14,marginBottom:18}}>
            Biztosan törlöd a <b>{tetel.azonosito}</b> tételt? Ez véglegesen eltávolítja a hozzá tartozó összes stádiumot, kezelést, analitikai mérést és edény-tartalom rekordot is. <b>Ez nem vonható vissza.</b>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setTorlesNyitva(false)} style={{
              flex:1, background:'transparent', border:'1px solid var(--line)', borderRadius:6,
              padding:'11px', fontWeight:600, fontSize:14, cursor:'pointer', color:'var(--ink)'
            }}>Mégse</button>
            <button onClick={tetelTorles} disabled={torles} style={{
              flex:1, background:'var(--wine)', color:'#fff', border:'none', borderRadius:6,
              padding:'11px', fontWeight:700, fontSize:14, cursor:'pointer', opacity: torles ? .5 : 1
            }}>{torles?'Törlés…':'Igen, törlöm'}</button>
          </div>
        </ModalShell>
      )}
    </main>
  );
}

function StadiumSav({stadiumok,szin}){
  if(stadiumok.length===0) return <div style={{color:'var(--ink-soft)',fontSize:13}}>Nincsenek stádiumok beállítva.</div>;
  return (
    <div style={{display:'flex',alignItems:'center',overflowX:'auto',paddingBottom:6}}>
      {stadiumok.map((s,i)=>{
        const kesz = !!s.befejezve;
        const aktiv = s.elkezdve && !s.befejezve;
        return (
          <React.Fragment key={s.id}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',minWidth:86}}>
              <div style={{
                width:30,height:30,borderRadius:'50%',
                background: kesz ? szin : (aktiv ? 'var(--paper)' : '#EEEAE0'),
                border: aktiv ? `3px solid ${szin}` : (kesz ? 'none' : '2px solid var(--line)'),
                display:'flex',alignItems:'center',justifyContent:'center',
                color: kesz ? '#fff' : 'var(--ink-soft)', fontWeight:700, fontSize:13
              }}>{kesz ? '✓' : i+1}</div>
              <div style={{fontSize:11.5, marginTop:6, textAlign:'center', color: aktiv ? 'var(--ink)' : 'var(--ink-soft)', fontWeight: aktiv?700:500, maxWidth:90}}>{s.nev}</div>
              {s.elkezdve && <div className="mono" style={{fontSize:9.5,color:'var(--ink-soft)',marginTop:2}}>{fmtDate(s.elkezdve)}</div>}
            </div>
            {i<stadiumok.length-1 && (
              <div style={{height:2, flex:1, minWidth:20, background: stadiumok[i+1].elkezdve || kesz ? szin : 'var(--line)', marginBottom:24}}></div>
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function Idovonal({stadiumok,kezelesek,analitikak}){
  const esemenyek = [
    ...kezelesek.map(k=>({...k,_tipus:'kezeles',_datum:k.datum})),
    ...analitikak.map(a=>({...a,_tipus:'analitika',_datum:a.datum}))
  ].sort((a,b)=> new Date(b._datum) - new Date(a._datum));

  if(esemenyek.length===0){
    return <UresAllapot szoveg="Még nincs rögzített esemény ehhez a tételhez." />;
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {esemenyek.map((e,i)=>(
        <div key={i} style={{
          display:'flex', gap:14, padding:'12px 16px', background:'var(--paper)',
          border:'1px solid var(--line)', borderRadius:8
        }}>
          <div className="mono" style={{fontSize:12, color:'var(--ink-soft)', minWidth:78, paddingTop:2}}>{fmtDate(e._datum)}</div>
          <div style={{flex:1}}>
            {e._tipus==='kezeles' ? (
              <>
                <div style={{fontWeight:700,fontSize:14,color:'var(--wine)'}}>{e.tipus}{e.stadium_nev?` · ${e.stadium_nev}`:''}</div>
                <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:2}}>
                  {(e.kezeloanyagok && e.kezeloanyagok.nev) ? `${e.kezeloanyagok.nev} — ${e.mennyiseg||''} ${e.mertekegyseg||''}` : ''}
                  {e.megjegyzes ? `  ${e.megjegyzes}` : ''}
                </div>
                {e.vegezte && <div style={{fontSize:11.5,color:'var(--ink-soft)',marginTop:2}}>Végezte: {e.vegezte}</div>}
              </>
            ) : (
              <>
                <div style={{fontWeight:700,fontSize:14,color:'var(--leaf)'}}>Analitikai mérés</div>
                <div className="mono" style={{fontSize:12.5,color:'var(--ink-soft)',marginTop:3,display:'flex',gap:14,flexWrap:'wrap'}}>
                  {e.cukorfok!=null && <span>Cukorfok: {e.cukorfok}</span>}
                  {e.ph!=null && <span>pH: {e.ph}</span>}
                  {e.sav!=null && <span>Sav: {e.sav} g/l</span>}
                  {e.so2_szabad!=null && <span>SO2 szabad: {e.so2_szabad} mg/l</span>}
                  {e.so2_osszes!=null && <span>SO2 összes: {e.so2_osszes} mg/l</span>}
                  {e.alkohol!=null && <span>Alkohol: {e.alkohol}%</span>}
                  {e.homerseklet!=null && <span>Hőm.: {e.homerseklet}°C</span>}
                </div>
                {e.megjegyzes && <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:2}}>{e.megjegyzes}</div>}
              </>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

function KezelesLista({kezelesek}){
  if(kezelesek.length===0) return <UresAllapot szoveg="Még nincs rögzített kezelés. Add hozzá az elsőt a gombbal." />;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {kezelesek.map(k=>(
        <div key={k.id} style={{padding:'12px 16px',background:'var(--paper)',border:'1px solid var(--line)',borderRadius:8,display:'flex',gap:14}}>
          <div className="mono" style={{fontSize:12,color:'var(--ink-soft)',minWidth:78}}>{fmtDate(k.datum)}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14}}>{k.tipus} {k.stadium_nev && <span style={{color:'var(--ink-soft)',fontWeight:500}}>· {k.stadium_nev}</span>}</div>
            <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:2}}>
              {(k.kezeloanyagok && k.kezeloanyagok.nev) && `${k.kezeloanyagok.nev} — ${k.mennyiseg||''} ${k.mertekegyseg||''}`}
            </div>
            {k.megjegyzes && <div style={{fontSize:13,marginTop:2}}>{k.megjegyzes}</div>}
            {k.vegezte && <div style={{fontSize:11.5,color:'var(--ink-soft)',marginTop:3}}>Végezte: {k.vegezte}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function AnalitikaLista({analitikak}){
  if(analitikak.length===0) return <UresAllapot szoveg="Még nincs rögzített mérés. Add hozzá az elsőt a gombbal." />;
  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{borderBottom:'2px solid var(--line)',textAlign:'left'}}>
            {['Dátum','Cukorfok','pH','Sav (g/l)','SO2 szab.','SO2 össz.','Alkohol %','Hőm. °C','Megjegyzés'].map(h=>(
              <th key={h} style={{padding:'8px 10px',color:'var(--ink-soft)',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody className="mono">
          {analitikak.map(a=>(
            <tr key={a.id} style={{borderBottom:'1px solid var(--line)'}}>
              <td style={{padding:'8px 10px'}}>{fmtDate(a.datum)}</td>
              <td style={{padding:'8px 10px'}}>{a.cukorfok!=null?a.cukorfok:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.ph!=null?a.ph:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.sav!=null?a.sav:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.so2_szabad!=null?a.so2_szabad:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.so2_osszes!=null?a.so2_osszes:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.alkohol!=null?a.alkohol:'—'}</td>
              <td style={{padding:'8px 10px'}}>{a.homerseklet!=null?a.homerseklet:'—'}</td>
              <td style={{padding:'8px 10px',fontFamily:"'Inter',sans-serif"}}>{a.megjegyzes||''}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function UresAllapot({szoveg}){
  return (
    <div style={{padding:'40px 20px',textAlign:'center',color:'var(--ink-soft)',fontSize:14,background:'var(--paper)',border:'1px dashed var(--line)',borderRadius:8}}>
      {szoveg}
    </div>
  );
}

// ---------- Modal: Új tétel ----------
function ModalShell({title,onClose,children,width}){
  return (
    <div onClick={onClose} style={{
      position:'fixed',inset:0,background:'rgba(26,47,26,0.45)',zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center',padding:16
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'var(--paper)', borderRadius:12, padding:'24px 26px', width: width||440,
        maxWidth:'100%', maxHeight:'88vh', overflowY:'auto', boxShadow:'0 20px 60px rgba(0,0,0,.25)'
      }}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div className="display" style={{fontSize:20,fontWeight:600}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--ink-soft)'}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label,children}){
  return (
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:12.5,fontWeight:600,color:'var(--ink-soft)',marginBottom:5}}>{label}</label>
      {children}
    </div>
  );
}
const inputStyle={width:'100%',padding:'9px 11px',border:'1px solid var(--line)',borderRadius:6,fontSize:14,background:'#fff'};

function UjTetelModal({sablonok,onClose,onCreated,tetel}){
  const szerkesztes = !!tetel;
  const [form,setForm] = useState(szerkesztes ? {
    azonosito: tetel.azonosito||'', evjarat: tetel.evjarat||new Date().getFullYear(),
    fajta: tetel.fajta||'', borfajta: tetel.borfajta||'Fehérbor', dulo: tetel.dulo||'',
    mennyiseg_kg: tetel.mennyiseg_kg!=null ? String(tetel.mennyiseg_kg) : '',
    mennyiseg_liter: tetel.mennyiseg_liter!=null ? String(tetel.mennyiseg_liter) : '',
    allapot: tetel.allapot||'aktív', megjegyzes: tetel.megjegyzes||''
  } : {azonosito:'',evjarat:new Date().getFullYear(),fajta:'',borfajta:'Fehérbor',dulo:'',mennyiseg_kg:'',mennyiseg_liter:'',allapot:'aktív',megjegyzes:''});
  const [mentes,setMentes] = useState(false);
  const borfajtak = Object.keys(sablonok).length ? Object.keys(sablonok) : ['Fehérbor','Vörösbor','Rosé','Pezsgő'];

  const submit = async ()=>{
    if(!form.azonosito || !form.fajta) return;
    setMentes(true);

    if(szerkesztes){
      await sbUpdate('tetelek', tetel.id, {
        azonosito: form.azonosito,
        evjarat: parseInt(form.evjarat)||new Date().getFullYear(),
        fajta: form.fajta,
        borfajta: form.borfajta,
        dulo: form.dulo||null,
        mennyiseg_kg: form.mennyiseg_kg? parseFloat(form.mennyiseg_kg): null,
        mennyiseg_liter: form.mennyiseg_liter? parseFloat(form.mennyiseg_liter): null,
        allapot: form.allapot,
        megjegyzes: form.megjegyzes||null
      });
      onCreated(tetel.id);
    } else {
      const ujak = await sbInsert('tetelek',{
        azonosito: form.azonosito,
        evjarat: parseInt(form.evjarat)||new Date().getFullYear(),
        fajta: form.fajta,
        borfajta: form.borfajta,
        dulo: form.dulo||null,
        mennyiseg_kg: form.mennyiseg_kg? parseFloat(form.mennyiseg_kg): null,
        mennyiseg_liter: form.mennyiseg_liter? parseFloat(form.mennyiseg_liter): null,
        jelenlegi_stadium_sorrend: 1,
        allapot: 'aktív',
        megjegyzes: form.megjegyzes||null
      });
      if(ujak && ujak[0]){
        const tetelId = ujak[0].id;
        const stadiumNevek = sablonok[form.borfajta] || [];
        const most = new Date().toISOString();
        for(let i=0;i<stadiumNevek.length;i++){
          await sbInsert('tetel_stadiumok',{
            tetel_id: tetelId, nev: stadiumNevek[i], sorrend: i+1,
            elkezdve: i===0 ? most : null
          });
        }
        onCreated(tetelId);
      }
    }
    setMentes(false);
  };

  return (
    <ModalShell title={szerkesztes ? "Tétel szerkesztése" : "Új tétel létrehozása"} onClose={onClose}>
      <Field label="Tétel azonosító">
        <input style={inputStyle} placeholder="pl. 2026-OLASZRIZLING-01" value={form.azonosito} onChange={e=>setForm({...form,azonosito:e.target.value})} />
      </Field>
      <div style={{display:'flex',gap:10}}>
        <Field label="Évjárat"><input type="number" style={inputStyle} value={form.evjarat} onChange={e=>setForm({...form,evjarat:e.target.value})} /></Field>
        <Field label="Szőlőfajta"><input style={inputStyle} placeholder="pl. Olaszrizling" value={form.fajta} onChange={e=>setForm({...form,fajta:e.target.value})} /></Field>
      </div>
      <Field label={szerkesztes ? "Borfajta (utólag nem módosítható)" : "Borfajta (meghatározza a stádiumokat)"}>
        <select style={{...inputStyle, opacity: szerkesztes ? .6 : 1}} value={form.borfajta} onChange={e=>setForm({...form,borfajta:e.target.value})} disabled={szerkesztes}>
          {borfajtak.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
      </Field>
      <Field label="Dűlő / eredet (opcionális)">
        <input style={inputStyle} value={form.dulo} onChange={e=>setForm({...form,dulo:e.target.value})} />
      </Field>
      <div style={{display:'flex',gap:10}}>
        <Field label="Mennyiség (kg)"><input type="number" style={inputStyle} value={form.mennyiseg_kg} onChange={e=>setForm({...form,mennyiseg_kg:e.target.value})} /></Field>
        <Field label="Mennyiség (liter)"><input type="number" style={inputStyle} value={form.mennyiseg_liter} onChange={e=>setForm({...form,mennyiseg_liter:e.target.value})} /></Field>
      </div>
      {szerkesztes && (
        <Field label="Állapot">
          <select style={inputStyle} value={form.allapot} onChange={e=>setForm({...form,allapot:e.target.value})}>
            <option value="aktív">Aktív</option>
            <option value="lezárt">Lezárt</option>
            <option value="palackozott">Palackozott</option>
          </select>
        </Field>
      )}
      <Field label="Megjegyzés (opcionális)">
        <textarea style={{...inputStyle,minHeight:60,resize:'vertical'}} value={form.megjegyzes} onChange={e=>setForm({...form,megjegyzes:e.target.value})} />
      </Field>
      <button onClick={submit} disabled={mentes || !form.azonosito || !form.fajta} style={{

// ---------- Edény-művelet modal: betöltés / fejtés / szétfejtés / házasítás / kiürítés ----------
function EdenyMuveletModal({muvelet,edenyek,edenyTartalom,tetelek,onClose,onDone}){
  const {tipus, edeny, tartalom} = muvelet;
  const [mentes,setMentes] = useState(false);

  // --- BETÖLTÉS: üres edénybe tétel betöltése ---
  const [betoltesTetelId,setBetoltesTetelId] = useState('');
  const [betoltesMennyiseg,setBetoltesMennyiseg] = useState('');

  const betoltesSubmit = async ()=>{
    if(!betoltesTetelId || !betoltesMennyiseg) return;
    setMentes(true);
    await sbInsert('edeny_tartalom',{ edeny_id: edeny.id, tetel_id: betoltesTetelId, mennyiseg_liter: parseFloat(betoltesMennyiseg) });
    await sbInsert('edeny_mozgasok',{ tipus:'Betöltés', cel_edeny_id: edeny.id, tetel_id: betoltesTetelId, mennyiseg_liter: parseFloat(betoltesMennyiseg) });
    setMentes(false);
    onDone();
  };

  // --- FEJTÉS: teljes mennyiség átkerül egy másik (üres) edénybe ---
  const ureseEdenyek = edenyek.filter(e => e.id!==(edeny && edeny.id) && !edenyTartalom.find(t=>t.edeny_id===e.id));
  const [fejtesCelEdeny,setFejtesCelEdeny] = useState('');

  const fejtesSubmit = async ()=>{
    if(!fejtesCelEdeny || !tartalom) return;
    setMentes(true);
    await sbInsert('edeny_tartalom',{ edeny_id: fejtesCelEdeny, tetel_id: tartalom.tetel_id, agazat: tartalom.agazat||null, mennyiseg_liter: tartalom.mennyiseg_liter });
    await sbDelete('edeny_tartalom', tartalom.id);
    await sbInsert('edeny_mozgasok',{ tipus:'Fejtés', forras_edeny_id: edeny.id, cel_edeny_id: fejtesCelEdeny, tetel_id: tartalom.tetel_id, mennyiseg_liter: tartalom.mennyiseg_liter });
    setMentes(false);
    onDone();
  };

  // --- SZÉTFEJTÉS: a jelenlegi edény tartalma 2+ edénybe oszlik, /1 /2 jelöléssel ---
  const [szetfejtesSorok,setSzetfejtesSorok] = useState([{edeny_id:'',mennyiseg:''},{edeny_id:'',mennyiseg:''}]);

  const szetfejtesSorHozzaad = () => setSzetfejtesSorok([...szetfejtesSorok, {edeny_id:'',mennyiseg:''}]);
  const szetfejtesSorValt = (i,key,val) => {
    const uj = [...szetfejtesSorok]; uj[i] = {...uj[i], [key]:val}; setSzetfejtesSorok(uj);
  };
  const szetfejtesOsszeg = szetfejtesSorok.reduce((sum,s)=> sum + (parseFloat(s.mennyiseg)||0), 0);

  const szetfejtesSubmit = async () => {
    const ervenyesSorok = szetfejtesSorok.filter(s=>s.edeny_id && s.mennyiseg);
    if(ervenyesSorok.length < 2) return;
    setMentes(true);
    const alapAgazat = tartalom.agazat ? tartalom.agazat : '';
    for(let i=0;i<ervenyesSorok.length;i++){
      const ujAg = alapAgazat ? `${alapAgazat}.${i+1}` : String(i+1);
      await sbInsert('edeny_tartalom',{
        edeny_id: ervenyesSorok[i].edeny_id, tetel_id: tartalom.tetel_id,
        agazat: ujAg, mennyiseg_liter: parseFloat(ervenyesSorok[i].mennyiseg)
      });
      await sbInsert('edeny_mozgasok',{
        tipus:'Szétfejtés', forras_edeny_id: edeny.id, cel_edeny_id: ervenyesSorok[i].edeny_id,
        tetel_id: tartalom.tetel_id, mennyiseg_liter: parseFloat(ervenyesSorok[i].mennyiseg)
      });
    }
    await sbDelete('edeny_tartalom', tartalom.id);
    setMentes(false);
    onDone();
  };

  // --- HÁZASÍTÁS: ez az edény + egy másik (más tételt tartalmazó) edény tartalma összeolvad, új tétel jön létre ---
  const masikTetelesEdeny = edenyTartalom.filter(t => t.edeny_id!==(edeny && edeny.id) && t.tetel_id!==(tartalom && tartalom.tetel_id));
  const [hazasitasMasikId,setHazasitasMasikId] = useState('');
  const [hazasitasUjAzonosito,setHazasitasUjAzonosito] = useState('');
  const [hazasitasCelEdeny,setHazasitasCelEdeny] = useState('');

  const hazasitasSubmit = async () => {
    const masik = edenyTartalom.find(t=>t.id===hazasitasMasikId);
    if(!masik || !hazasitasUjAzonosito || !hazasitasCelEdeny) return;
    setMentes(true);
    const sajatTetel = tetelek.find(t=>t.id===tartalom.tetel_id);
    const ossz = tartalom.mennyiseg_liter + masik.mennyiseg_liter;

    const ujak = await sbInsert('tetelek',{
      azonosito: hazasitasUjAzonosito,
      evjarat: (sajatTetel && sajatTetel.evjarat) || new Date().getFullYear(),
      fajta: 'Házasítás / cuvée',
      borfajta: (sajatTetel && sajatTetel.borfajta) || 'Fehérbor',
      jelenlegi_stadium_sorrend: 1,
      allapot: 'aktív',
      megjegyzes: `Házasítva: ${tartalom.mennyiseg_liter} l + ${masik.mennyiseg_liter} l`
    });

    if(ujak && ujak[0]){
      const ujTetelId = ujak[0].id;
      await sbInsert('tetel_szarmazas',{ uj_tetel_id: ujTetelId, forras_tetel_id: tartalom.tetel_id, mennyiseg_liter: tartalom.mennyiseg_liter });
      await sbInsert('tetel_szarmazas',{ uj_tetel_id: ujTetelId, forras_tetel_id: masik.tetel_id, mennyiseg_liter: masik.mennyiseg_liter });

      await sbInsert('edeny_tartalom',{ edeny_id: hazasitasCelEdeny, tetel_id: ujTetelId, mennyiseg_liter: ossz });
      await sbDelete('edeny_tartalom', tartalom.id);
      await sbDelete('edeny_tartalom', masik.id);

      await sbInsert('edeny_mozgasok',{ tipus:'Házasítás', cel_edeny_id: hazasitasCelEdeny, tetel_id: ujTetelId, mennyiseg_liter: ossz, megjegyzes:`Forrás tételek összeházasítva` });

      // eredeti tételeket lezárjuk, mert felszívódtak az új tételbe
      await sbUpdate('tetelek', tartalom.tetel_id, {allapot:'lezárt'});
      await sbUpdate('tetelek', masik.tetel_id, {allapot:'lezárt'});
    }
    setMentes(false);
    onDone();
  };

  // --- KIÜRÍTÉS: tartalom eltávolítása anélkül, hogy másik edénybe kerülne (pl. minta, selejt) ---
  const kiuritesSubmit = async () => {
    setMentes(true);
    await sbInsert('edeny_mozgasok',{ tipus:'Kiürítés', forras_edeny_id: edeny.id, tetel_id: tartalom.tetel_id, mennyiseg_liter: tartalom.mennyiseg_liter });
    await sbDelete('edeny_tartalom', tartalom.id);
    setMentes(false);
    onDone();
  };

  const cimek = {betoltes:'Edény betöltése', fejtes:'Fejtés másik edénybe', szetfejtes:'Szétfejtés több edénybe', hazasitas:'Házasítás (cuvée)', kiurit:'Edény kiürítése'};

  return (
    <ModalShell title={cimek[tipus]} onClose={onClose} width={tipus==='szetfejtes' ? 520 : 460}>
      {tipus==='betoltes' && (
        <>
          <Field label="Melyik tételt töltjük be?">
            <select style={inputStyle} value={betoltesTetelId} onChange={e=>setBetoltesTetelId(e.target.value)}>
              <option value="">— válassz tételt —</option>
              {tetelek.filter(t=>t.allapot==='aktív').map(t=><option key={t.id} value={t.id}>{t.azonosito} ({t.fajta})</option>)}
            </select>
          </Field>
          <Field label={`Mennyiség (liter, max ${edeny.kapacitas_liter} l)`}>
            <input type="number" style={inputStyle} value={betoltesMennyiseg} onChange={e=>setBetoltesMennyiseg(e.target.value)} />
          </Field>
          <button onClick={betoltesSubmit} disabled={mentes || !betoltesTetelId || !betoltesMennyiseg} style={primaryBtn(mentes)}>{mentes?'Mentés…':'Betöltés rögzítése'}</button>
        </>
      )}

      {tipus==='fejtes' && (
        <>
          <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:14}}>
            Áthelyezed: <b>{tartalom.mennyiseg_liter} l</b> ebből az edényből ({edeny.nev}) egy másik, üres edénybe.
          </div>
          <Field label="Cél edény (csak üres edények)">
            <select style={inputStyle} value={fejtesCelEdeny} onChange={e=>setFejtesCelEdeny(e.target.value)}>
              <option value="">— válassz edényt —</option>
              {ureseEdenyek.map(e=><option key={e.id} value={e.id}>{e.nev} ({e.kapacitas_liter} l)</option>)}
            </select>
          </Field>
          {ureseEdenyek.length===0 && <div style={{fontSize:12.5,color:'var(--wine)',marginBottom:10}}>Nincs üres edény. Hozz létre egy újat, vagy üresíts ki egyet.</div>}
          <button onClick={fejtesSubmit} disabled={mentes || !fejtesCelEdeny} style={primaryBtn(mentes)}>{mentes?'Mentés…':'Fejtés rögzítése'}</button>
        </>
      )}

      {tipus==='szetfejtes' && (
        <>
          <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:14}}>
            Az edényben lévő <b>{tartalom.mennyiseg_liter} l</b> szétosztása több edénybe. A tétel neve <b>/1, /2</b> jelölést kap minden ágon.
          </div>
          {szetfejtesSorok.map((s,i)=>(
            <div key={i} style={{display:'flex',gap:8,marginBottom:10,alignItems:'flex-end'}}>
              <div style={{flex:1}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--ink-soft)',marginBottom:5}}>Cél edény {i+1}</label>
                <select style={inputStyle} value={s.edeny_id} onChange={e=>szetfejtesSorValt(i,'edeny_id',e.target.value)}>
                  <option value="">— válassz —</option>
                  {edenyek.filter(e=>e.id!==edeny.id).map(e=><option key={e.id} value={e.id}>{e.nev} ({e.kapacitas_liter} l)</option>)}
                </select>
              </div>
              <div style={{width:110}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--ink-soft)',marginBottom:5}}>Liter</label>
                <input type="number" style={inputStyle} value={s.mennyiseg} onChange={e=>szetfejtesSorValt(i,'mennyiseg',e.target.value)} />
              </div>
            </div>
          ))}
          <button onClick={szetfejtesSorHozzaad} style={{...btnMini, marginBottom:14}}>+ További ág hozzáadása</button>
          <div className="mono" style={{fontSize:12.5, color: szetfejtesOsszeg>tartalom.mennyiseg_liter ? 'var(--wine)' : 'var(--ink-soft)', marginBottom:14}}>
            Összesen elosztva: {szetfejtesOsszeg} l / {tartalom.mennyiseg_liter} l
          </div>
          <button onClick={szetfejtesSubmit} disabled={mentes} style={primaryBtn(mentes)}>{mentes?'Mentés…':'Szétfejtés rögzítése'}</button>
        </>
      )}

      {tipus==='hazasitas' && (
        <>
          <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:14}}>
            Ez az edény ({edeny.nev}) tartalmát összeházasítod egy másik, eltérő tételt tartalmazó edénnyel. Ez egy <b>új tételt</b> hoz létre.
          </div>
          <Field label="Melyik másik edénnyel házasítod?">
            <select style={inputStyle} value={hazasitasMasikId} onChange={e=>setHazasitasMasikId(e.target.value)}>
              <option value="">— válassz —</option>
              {masikTetelesEdeny.map(t=>{
                const e2 = edenyek.find(e=>e.id===t.edeny_id);
                const tet = tetelek.find(tt=>tt.id===t.tetel_id);
                return <option key={t.id} value={t.id}>{e2 ? e2.nev : ''} — {tet ? tet.azonosito : ''} ({t.mennyiseg_liter} l)</option>;
              })}
            </select>
          </Field>
          <Field label="Új tétel azonosítója">
            <input style={inputStyle} placeholder="pl. 2026-CUVEE-01" value={hazasitasUjAzonosito} onChange={e=>setHazasitasUjAzonosito(e.target.value)} />
          </Field>
          <Field label="Melyik edénybe kerüljön a házasított bor?">
            <select style={inputStyle} value={hazasitasCelEdeny} onChange={e=>setHazasitasCelEdeny(e.target.value)}>
              <option value="">— válassz —</option>
              <option value={edeny.id}>{edeny.nev} (jelenlegi)</option>
              {hazasitasMasikId && (()=>{ const t=edenyTartalom.find(x=>x.id===hazasitasMasikId); const e2=edenyek.find(e=>e.id===(t && t.edeny_id)); return e2 ? <option value={e2.id}>{e2.nev}</option> : null; })()}
              {edenyek.filter(e=>e.id!==edeny.id && !edenyTartalom.find(t=>t.edeny_id===e.id)).map(e=><option key={e.id} value={e.id}>{e.nev} (üres)</option>)}
            </select>
          </Field>
          <button onClick={hazasitasSubmit} disabled={mentes || !hazasitasMasikId || !hazasitasUjAzonosito || !hazasitasCelEdeny} style={primaryBtn(mentes)}>{mentes?'Mentés…':'Házasítás rögzítése'}</button>
        </>
      )}

      {tipus==='kiurit' && (
        <>
          <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:18}}>
            Biztosan kiüríted ezt az edényt? A tartalom ({tartalom.mennyiseg_liter} l) eltávolításra kerül, anélkül hogy másik edénybe kerülne (pl. minta, selejt, próbafejtés).
          </div>
          <button onClick={kiuritesSubmit} disabled={mentes} style={{...primaryBtn(mentes), background:'var(--wine)'}}>{mentes?'Mentés…':'Kiürítés megerősítése'}</button>
        </>
      )}
    </ModalShell>
  );
}

function primaryBtn(mentes){
  return {
    width:'100%', marginTop:4, background:'var(--ink)', color:'var(--cream)', border:'none',
    borderRadius:6, padding:'11px', fontWeight:700, fontSize:14, cursor:'pointer', opacity: mentes ? .5 : 1
  };
}

// ============================================================
// EXCEL EXPORT
// ============================================================
function ExportModal({tetelek,onClose}){
  const [evjaratSzuro,setEvjaratSzuro] = useState('mind');
  const [allapotSzuro,setAllapotSzuro] = useState('mind');
  const [generalas,setGeneralas] = useState(false);
  const [hiba,setHiba] = useState('');

  const evjaratok = Array.from(new Set(tetelek.map(t=>t.evjarat))).sort((a,b)=>b-a);

  const szurtTetelek = tetelek.filter(t=>
    (evjaratSzuro==='mind' || t.evjarat===parseInt(evjaratSzuro)) &&
    (allapotSzuro==='mind' || t.allapot===allapotSzuro)
  );

  const generalExcel = async () => {
    setGeneralas(true);
    setHiba('');
    try{
      const tetelIdk = szurtTetelek.map(t=>t.id);
      if(tetelIdk.length===0){ setHiba('Nincs a szűrésnek megfelelő tétel.'); setGeneralas(false); return; }
      const idLista = tetelIdk.join(',');

      const [stadiumokArr, kezelesekArr, analitikakArr, edenyTartalomArr, edenyMozgasokArr, edenyekArr, szarmazasArr] = await Promise.all([
        sbSelect('tetel_stadiumok', `select=*&tetel_id=in.(${idLista})&order=sorrend.asc`),
        sbSelect('kezelesek', `select=*,kezeloanyagok(nev,kategoria)&tetel_id=in.(${idLista})&order=datum.asc`),
        sbSelect('analitikak', `select=*&tetel_id=in.(${idLista})&order=datum.asc`),
        sbSelect('edeny_tartalom', `select=*,edenyek(nev,tipus)&tetel_id=in.(${idLista})`),
        sbSelect('edeny_mozgasok', `select=*&tetel_id=in.(${idLista})&order=datum.asc`),
        sbSelect('edenyek','select=*'),
        sbSelect('tetel_szarmazas', `select=*&uj_tetel_id=in.(${idLista})`)
      ]);

      const stadiumok = stadiumokArr||[];
      const kezelesek = kezelesekArr||[];
      const analitikak = analitikakArr||[];
      const edenyTartalom = edenyTartalomArr||[];
      const edenyMozgasok = edenyMozgasokArr||[];
      const edenyek = edenyekArr||[];
      const szarmazas = szarmazasArr||[];

      // --- Lap 1: Áttekintés ---
      const attekintes = szurtTetelek.map(t=>{
        const stT = stadiumok.filter(s=>s.tetel_id===t.id);
        const aktualisStadium = stT.find(s=>!s.befejezve);
        const elhelyezes = edenyTartalom.filter(e=>e.tetel_id===t.id)
          .map(e=> `${(e.edenyek&&e.edenyek.nev)||'?'}${e.agazat?'/'+e.agazat:''} (${e.mennyiseg_liter} l)`).join('; ');
        return {
          'Azonosító': t.azonosito,
          'Évjárat': t.evjarat,
          'Szőlőfajta': t.fajta,
          'Borfajta': t.borfajta,
          'Dűlő': t.dulo||'',
          'Állapot': t.allapot,
          'Jelenlegi stádium': aktualisStadium ? aktualisStadium.nev : (t.allapot==='palackozott'?'Palackozva':''),
          'Mennyiség (kg)': t.mennyiseg_kg||'',
          'Mennyiség (liter)': t.mennyiseg_liter||'',
          'Jelenlegi edény(ek)': elhelyezes,
          'Megjegyzés': t.megjegyzes||'',
          'Létrehozva': fmtDate(t.letrehozva)
        };
      });

      // --- Lap 2: Stádium-történet ---
      const stadiumSor = stadiumok.map(s=>{
        const t = szurtTetelek.find(tt=>tt.id===s.tetel_id);
        return {
          'Tétel': t ? t.azonosito : '',
          'Stádium': s.nev,
          'Sorrend': s.sorrend,
          'Elkezdve': s.elkezdve ? fmtDate(s.elkezdve) : '',
          'Befejezve': s.befejezve ? fmtDate(s.befejezve) : ''
        };
      });

      // --- Lap 3: Kezelések ---
      const kezelesSor = kezelesek.map(k=>{
        const t = szurtTetelek.find(tt=>tt.id===k.tetel_id);
        return {
          'Tétel': t ? t.azonosito : '',
          'Dátum': fmtDate(k.datum),
          'Stádium': k.stadium_nev||'',
          'Típus': k.tipus,
          'Kezelőanyag': (k.kezeloanyagok && k.kezeloanyagok.nev) || '',
          'Mennyiség': k.mennyiseg||'',
          'Mértékegység': k.mertekegyseg||'',
          'Végezte': k.vegezte||'',
          'Megjegyzés': k.megjegyzes||''
        };
      });

      // --- Lap 4: Analitikák ---
      const analitikaSor = analitikak.map(a=>{
        const t = szurtTetelek.find(tt=>tt.id===a.tetel_id);
        return {
          'Tétel': t ? t.azonosito : '',
          'Dátum': fmtDate(a.datum),
          'Cukorfok': a.cukorfok!=null?a.cukorfok:'',
          'pH': a.ph!=null?a.ph:'',
          'Sav (g/l)': a.sav!=null?a.sav:'',
          'SO2 szabad (mg/l)': a.so2_szabad!=null?a.so2_szabad:'',
          'SO2 összes (mg/l)': a.so2_osszes!=null?a.so2_osszes:'',
          'Alkohol (%)': a.alkohol!=null?a.alkohol:'',
          'Hőmérséklet (°C)': a.homerseklet!=null?a.homerseklet:'',
          'Megjegyzés': a.megjegyzes||''
        };
      });

      // --- Lap 5: Edény-mozgások ---
      const mozgasSor = edenyMozgasok.map(m=>{
        const t = szurtTetelek.find(tt=>tt.id===m.tetel_id);
        const forrasE = edenyek.find(e=>e.id===m.forras_edeny_id);
        const celE = edenyek.find(e=>e.id===m.cel_edeny_id);
        return {
          'Tétel': t ? t.azonosito : '',
          'Dátum': fmtDate(m.datum),
          'Típus': m.tipus,
          'Forrás edény': forrasE ? forrasE.nev : '',
          'Cél edény': celE ? celE.nev : '',
          'Mennyiség (liter)': m.mennyiseg_liter||'',
          'Megjegyzés': m.megjegyzes||''
        };
      });

      // --- Lap 6: Edények (jelenlegi állapot, teljes lista) ---
      const edenySor = edenyek.map(e=>{
        const tartalom = edenyTartalom.find(t=>t.edeny_id===e.id && tetelIdk.includes(t.tetel_id));
        const t = tartalom ? szurtTetelek.find(tt=>tt.id===tartalom.tetel_id) : null;
        return {
          'Edény neve': e.nev,
          'Típus': e.tipus,
          'Kapacitás (liter)': e.kapacitas_liter,
          'Helyszín': e.helyszin||'',
          'Jelenlegi tartalom': t ? `${t.azonosito}${tartalom.agazat?'/'+tartalom.agazat:''}` : '',
          'Mennyiség (liter)': tartalom ? tartalom.mennyiseg_liter : '',
          'Megjegyzés': e.megjegyzes||''
        };
      });

      // --- Lap 7: Származás (házasítások) ---
      const szarmazasSor = szarmazas.map(s=>{
        const ujT = szurtTetelek.find(tt=>tt.id===s.uj_tetel_id);
        return {
          'Új tétel': ujT ? ujT.azonosito : '',
          'Forrás tétel ID': s.forras_tetel_id,
          'Mennyiség (liter)': s.mennyiseg_liter||''
        };
      });

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attekintes), 'Áttekintés');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stadiumSor), 'Stádiumok');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(kezelesSor), 'Kezelések');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(analitikaSor), 'Analitikák');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mozgasSor), 'Edény mozgások');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(edenySor), 'Edények');
      if(szarmazasSor.length>0){
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(szarmazasSor), 'Származás (cuvée)');
      }

      const datumStr = new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb, `Pincekonyv_export_${datumStr}.xlsx`);
      onClose();
    }catch(e){
      setHiba('Hiba történt az export közben: '+e.message);
    }
    setGeneralas(false);
  };

  return (
    <ModalShell title="Export Excelbe" onClose={onClose}>
      <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:16}}>
        Az export 6-7 lapot tartalmaz: áttekintés, stádium-történet, kezelések, analitikák, edény-mozgások, edények és (ha van) származás. A szűrés csak az áttekintő lapra és a kapcsolódó tételekre vonatkozik.
      </div>
      <Field label="Évjárat szűrés">
        <select style={inputStyle} value={evjaratSzuro} onChange={e=>setEvjaratSzuro(e.target.value)}>
          <option value="mind">Minden évjárat</option>
          {evjaratok.map(ev=><option key={ev} value={ev}>{ev}</option>)}
        </select>
      </Field>
      <Field label="Állapot szűrés">
        <select style={inputStyle} value={allapotSzuro} onChange={e=>setAllapotSzuro(e.target.value)}>
          <option value="mind">Minden állapot</option>
          <option value="aktív">Csak aktív</option>
          <option value="lezárt">Csak lezárt</option>
          <option value="palackozott">Csak palackozott</option>
        </select>
      </Field>
      <div className="mono" style={{fontSize:12.5,color:'var(--ink-soft)',marginBottom:14}}>
        {szurtTetelek.length} tétel kerül exportálásra.
      </div>
      {hiba && <div style={{fontSize:13,color:'var(--wine)',marginBottom:14}}>{hiba}</div>}
      <button onClick={generalExcel} disabled={generalas} style={primaryBtn(generalas)}>
        {generalas ? 'Generálás…' : '⬇ Excel letöltése'}
      </button>
    </ModalShell>
  );
}

// ============================================================
// KEZELŐANYAGOK – lista / hozzáadás / szerkesztés / törlés
// ============================================================
function KezeloanyagokNezet({kezeloanyagok,onReload}){
  const [ujNyitva,setUjNyitva] = useState(false);
  const [szerkesztett,setSzerkesztett] = useState(null);
  const [torlendoId,setTorlendoId] = useState(null);
  const [mentes,setMentes] = useState(false);

  const torles = async (id) => {
    setMentes(true);
    await sbDelete('kezeloanyagok', id);
    setMentes(false);
    setTorlendoId(null);
    onReload();
  };

  const csoportok = {};
  kezeloanyagok.forEach(k=>{
    const kat = k.kategoria || 'Egyéb';
    if(!csoportok[kat]) csoportok[kat] = [];
    csoportok[kat].push(k);
  });

  return (
    <div style={{flex:1, padding:'24px 32px', overflowY:'auto', background:'var(--cream)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div className="display" style={{fontSize:22,fontWeight:600}}>Kezelőanyag-katalógus</div>
        <button onClick={()=>setUjNyitva(true)} style={{
          background:'var(--must)', color:'var(--ink)', border:'none', borderRadius:6,
          padding:'9px 16px', fontWeight:700, fontSize:14, cursor:'pointer'
        }}>+ Új kezelőanyag</button>
      </div>

      {kezeloanyagok.length===0 ? (
        <UresAllapot szoveg="Még nincs felvitt kezelőanyag. Hozz létre egyet a '+ Új kezelőanyag' gombbal." />
      ) : (
        Object.keys(csoportok).sort().map(kat=>(
          <div key={kat} style={{marginBottom:22}}>
            <div style={{fontSize:12.5, fontWeight:700, color:'var(--ink-soft)', textTransform:'uppercase', letterSpacing:'.04em', marginBottom:8}}>{kat}</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {csoportok[kat].map(k=>(
                <div key={k.id} style={{
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  background:'var(--paper)', border:'1px solid var(--line)', borderRadius:8, padding:'10px 14px'
                }}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{k.nev}</div>
                    {k.mertekegyseg && <div className="mono" style={{fontSize:12,color:'var(--ink-soft)',marginTop:2}}>Mértékegység: {k.mertekegyseg}</div>}
                    {k.megjegyzes && <div style={{fontSize:12.5,color:'var(--ink-soft)',marginTop:2}}>{k.megjegyzes}</div>}
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>setSzerkesztett(k)} style={btnMini}>✎ Szerkesztés</button>
                    {torlendoId===k.id ? (
                      <>
                        <button onClick={()=>torles(k.id)} disabled={mentes} style={{...btnMini,color:'#fff',background:'var(--wine)',borderColor:'var(--wine)'}}>Biztos?</button>
                        <button onClick={()=>setTorlendoId(null)} style={btnMini}>Mégse</button>
                      </>
                    ) : (
                      <button onClick={()=>setTorlendoId(k.id)} style={{...btnMini,color:'var(--wine)'}}>🗑</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))
      )}

      {(ujNyitva || szerkesztett) && (
        <KezeloanyagModal
          kezeloanyag={szerkesztett}
          onClose={()=>{ setUjNyitva(false); setSzerkesztett(null); }}
          onSaved={()=>{ onReload(); setUjNyitva(false); setSzerkesztett(null); }}
        />
      )}
    </div>
  );
}

function KezeloanyagModal({kezeloanyag,onClose,onSaved}){
  const szerkesztes = !!kezeloanyag;
  const [form,setForm] = useState(szerkesztes ? {
    nev: kezeloanyag.nev||'', kategoria: kezeloanyag.kategoria||'', mertekegyseg: kezeloanyag.mertekegyseg||'', megjegyzes: kezeloanyag.megjegyzes||''
  } : {nev:'',kategoria:'',mertekegyseg:'',megjegyzes:''});
  const [mentes,setMentes] = useState(false);
  const [hiba,setHiba] = useState('');

  const mertekegysegek = ['g/hl','ml/hl','kg/hl','g','ml','kg','l','db','%'];
  const kategoriak = ['Kénezés','Derítés','Enzim','Élesztő','Élesztő tápanyag','Savkorrekció','Cukrozás','MLF','Mikrobiológiai stabilizálás','Egyéb'];

  const submit = async ()=>{
    if(!form.nev) return;
    setMentes(true);
    setHiba('');
    if(szerkesztes){
      await sbUpdate('kezeloanyagok', kezeloanyag.id, {
        nev: form.nev, kategoria: form.kategoria||null, mertekegyseg: form.mertekegyseg||null, megjegyzes: form.megjegyzes||null
      });
    } else {
      const eredmeny = await sbInsert('kezeloanyagok', {
        nev: form.nev, kategoria: form.kategoria||null, mertekegyseg: form.mertekegyseg||null, megjegyzes: form.megjegyzes||null
      });
      if(!eredmeny){ setHiba('Mentés sikertelen — lehet, hogy már létezik ilyen nevű anyag.'); setMentes(false); return; }
    }
    setMentes(false);
    onSaved();
  };

  return (
    <ModalShell title={szerkesztes ? "Kezelőanyag szerkesztése" : "Új kezelőanyag"} onClose={onClose}>
      <Field label="Név">
        <input style={inputStyle} placeholder="pl. Bentonit" value={form.nev} onChange={e=>setForm({...form,nev:e.target.value})} />
      </Field>
      <Field label="Kategória">
        <input style={inputStyle} list="kategoria-lista" placeholder="pl. Derítés" value={form.kategoria} onChange={e=>setForm({...form,kategoria:e.target.value})} />
        <datalist id="kategoria-lista">
          {kategoriak.map(k=><option key={k} value={k} />)}
        </datalist>
      </Field>
      <Field label="Mértékegység">
        <input style={inputStyle} list="mertekegyseg-lista" placeholder="pl. g/hl" value={form.mertekegyseg} onChange={e=>setForm({...form,mertekegyseg:e.target.value})} />
        <datalist id="mertekegyseg-lista">
          {mertekegysegek.map(m=><option key={m} value={m} />)}
        </datalist>
      </Field>
      <Field label="Megjegyzés (opcionális)">
        <textarea style={{...inputStyle,minHeight:50,resize:'vertical'}} value={form.megjegyzes} onChange={e=>setForm({...form,megjegyzes:e.target.value})} />
      </Field>
      {hiba && <div style={{fontSize:13,color:'var(--wine)',marginBottom:14}}>{hiba}</div>}
      <button onClick={submit} disabled={mentes || !form.nev} style={primaryBtn(mentes || !form.nev)}>
        {mentes ? 'Mentés…' : (szerkesztes ? 'Módosítások mentése' : 'Kezelőanyag létrehozása')}
      </button>
    </ModalShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
